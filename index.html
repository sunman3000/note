<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>云同步·树形目录记事本</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #e8e6df; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 100%; height: 100%; max-width: 1400px; max-height: 900px; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.12); background: #f5f5f0; }
        .left-panel { width: 320px; min-width: 200px; max-width: 55%; background: #fafaf7; display: flex; flex-direction: column; border-right: 1px solid #e0e0d8; }
        .left-toolbar { display: flex; gap: 6px; padding: 8px 10px; border-bottom: 1px solid #e0e0d8; align-items: center; flex-wrap: wrap; }
        .left-toolbar input { height: 32px; border: 1.5px solid #e0e0d8; border-radius: 20px; padding: 0 14px; font-size: 13px; outline: none; flex: 1; min-width: 80px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 5px; border: 1.5px solid transparent; background: transparent; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #7a7a70; }
        .btn-icon:hover { background: #f0f0ea; border-color: #e0e0d8; }
        .directory-area { flex: 1; overflow-y: auto; padding: 6px; }
        .dir-node .dir-row { display: flex; align-items: center; gap: 3px; padding: 7px 8px 7px calc(8px + var(--depth)*18px); margin: 1px 2px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; font-size: 13px; }
        .dir-node .dir-row:hover { background: #f0f0ea; }
        .dir-node .dir-row.selected { background: #e6efe4; border-color: #5b8c5a; }
        .dir-node .expand-btn { width: 20px; height: 20px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #7a7a70; }
        .dir-node .star-btn { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; font-size: 15px; opacity: 0; }
        .dir-node .dir-row:hover .star-btn { opacity: 1; }
        .dir-node .star-btn.starred { opacity: 1; color: #d4a017; }
        .dir-node .children { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.25s; }
        .dir-node.expanded > .children { max-height: 5000px; opacity: 1; }
        .right-panel { flex: 1; display: flex; flex-direction: column; background: #fffefc; }
        .editor-toolbar { display: flex; gap: 3px; padding: 6px 10px; border-bottom: 1px solid #e0e0d8; align-items: center; flex-wrap: wrap; }
        .editor-content { flex: 1; padding: 20px; outline: none; font-size: 15px; line-height: 1.75; }
        .divider { width: 5px; background: #e8e6df; cursor: col-resize; }
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 500; }
        .auth-card { background: #fff; padding: 28px 32px; border-radius: 16px; width: 380px; max-width: 90vw; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #e0e0d8; border-radius: 8px; font-size: 14px; outline: none; }
        .auth-card button { width: 100%; padding: 12px; margin-top: 12px; background: #5b8c5a; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3a3a35; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 13px; z-index: 200; }
    </style>
</head>
<body>
    <div id="authOverlay" class="auth-overlay" style="display:none;">
        <div class="auth-card">
            <h2>📝 云同步记事本</h2>
            <p>使用邮箱登录，跨设备同步数据</p>
            <input type="email" id="authEmail" placeholder="邮箱地址" autocomplete="email">
            <input type="password" id="authPassword" placeholder="密码（至少6位）">
            <div id="authError" style="color:#c0392b;font-size:12px;min-height:18px;"></div>
            <button id="btnLogin">登 录</button>
            <button id="btnRegister" style="background:transparent;color:#5b8c5a;border:1.5px solid #5b8c5a;">注册新账号</button>
        </div>
    </div>
    <div class="app-container" id="appContainer" style="display:none;">
        <div class="left-panel">
            <div class="left-toolbar">
                <button class="btn-icon" id="btnNewDir" title="新建根目录">＋</button>
                <input type="text" id="searchInput" placeholder="搜索目录或笔记...">
                <button class="btn-icon" id="btnDelete" title="删除选中目录" disabled>🗑</button>
                <button class="btn-icon" id="btnTrash" title="垃圾箱">📦</button>
                <button class="btn-icon" id="btnLogout" style="font-size:12px;width:auto;padding:0 8px;">🚪</button>
            </div>
            <div class="directory-area" id="directoryArea">
                <div id="treeView"></div>
                <div id="treeEmpty" style="text-align:center;padding:40px;color:#7a7a70;">📂 还没有目录，点击 ＋ 创建</div>
                <div id="trashView" style="display:none;">
                    <div style="padding:10px;border-bottom:1px solid #e0e0d8;font-weight:bold;">🗑 垃圾箱 <button id="btnBackFromTrash" style="float:right;">返回目录</button></div>
                    <div id="trashList" style="padding:10px;"></div>
                </div>
            </div>
        </div>
        <div class="divider" id="divider"></div>
        <div class="right-panel">
            <div class="editor-toolbar">
                <input type="text" id="noteTitleInput" placeholder="笔记标题" disabled style="height:30px;flex:1;border:1px solid transparent;background:transparent;font-weight:bold;padding:0 8px;">
                <button id="btnBold"><b>B</b></button>
                <button id="btnItalic"><i>I</i></button>
                <button id="btnUnderline"><u>U</u></button>
                <select id="fontSizeSelect"><option value="1">小</option><option value="3" selected>中</option><option value="5">大</option></select>
                <input type="color" id="fontColorInput" value="#3a3a35">
                <button id="btnUL">•≡</button>
                <button id="btnOL">1≡</button>
            </div>
            <div class="editor-content" id="editorContent" contenteditable="true" style="display:none;"></div>
            <div id="noNoteSelected" style="display:flex;align-items:center;justify-content:center;height:100%;color:#c5c3ba;">📝 选择左侧目录开始编辑</div>
        </div>
    </div>
    <div id="toastContainer"></div>
    <script>
        (function() {
            // ⚠️ 请替换为你的 Supabase 项目 URL 和 Publishable key
            const SUPABASE_URL = 'https://vrpabvwlmbjrnuonkunj.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_QFSk4H9MXbh_e9sXBoPGWQ_apyJVtEz';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            let currentUser = null;
            let directories = [];
            let notesCache = {};
            let trashList = [];
            let selectedDirId = null;
            let isTrashView = false;

            // 认证
            async function checkSession() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    currentUser = session.user;
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'flex';
                    await loadAllData();
                } else {
                    currentUser = null;
                    document.getElementById('authOverlay').style.display = 'flex';
                    document.getElementById('appContainer').style.display = 'none';
                }
            }

            document.getElementById('btnLogin').addEventListener('click', async () => {
                const email = document.getElementById('authEmail').value.trim();
                const pwd = document.getElementById('authPassword').value;
                const { error } = await supabase.auth.signInWithPassword({ email, password: pwd });
                if (error) return document.getElementById('authError').textContent = '登录失败: ' + error.message;
                checkSession();
            });
            document.getElementById('btnRegister').addEventListener('click', async () => {
                const email = document.getElementById('authEmail').value.trim();
                const pwd = document.getElementById('authPassword').value;
                if (pwd.length < 6) return document.getElementById('authError').textContent = '密码至少6位';
                const { error } = await supabase.auth.signUp({ email, password: pwd });
                if (error) return document.getElementById('authError').textContent = '注册失败: ' + error.message;
                checkSession();
            });
            document.getElementById('btnLogout').addEventListener('click', async () => {
                await supabase.auth.signOut();
                location.reload();
            });

            // 数据加载
            async function loadAllData() {
                try {
                    const { data: dirs } = await supabase.from('directories').select('*').order('order_index');
                    directories = dirs || [];
                    const ids = directories.map(d => d.id);
                    if (ids.length) {
                        const { data: notes } = await supabase.from('notes').select('dir_id,content').in('dir_id', ids);
                        notesCache = {};
                        (notes || []).forEach(n => { notesCache[n.dir_id] = n.content || ''; });
                    } else notesCache = {};
                    const { data: trash } = await supabase.from('trash').select('*').order('deleted_at', { ascending: false });
                    trashList = trash || [];
                } catch (e) {
                    console.warn('数据加载失败:', e.message);
                }
                renderTree();
                updateEditorState();
            }

            // 帮助函数
            function getChildren(parentId) {
                return directories.filter(d => d.parentId === parentId).sort((a,b) => (b.isStarred - a.isStarred) || (a.order - b.order));
            }
            function getDescendantIds(dirId) {
                const result = [];
                const stack = [dirId];
                while (stack.length) {
                    const cur = stack.pop();
                    getChildren(cur).forEach(c => { result.push(c.id); stack.push(c.id); });
                }
                return result;
            }
            function generateId() { return 'd_' + Date.now() + '_' + Math.random().toString(36).substr(2,6); }

            // 渲染
            function renderTree() {
                const rootDirs = getChildren(null);
                const treeView = document.getElementById('treeView');
                const treeEmpty = document.getElementById('treeEmpty');
                if (rootDirs.length === 0 && directories.length === 0) {
                    treeView.innerHTML = '';
                    treeEmpty.style.display = 'block';
                } else {
                    treeEmpty.style.display = 'none';
                    treeView.innerHTML = '';
                    rootDirs.forEach(dir => treeView.appendChild(createDirNodeElement(dir, 0)));
                }
                document.getElementById('btnDelete').disabled = !selectedDirId || isTrashView;
            }

            function createDirNodeElement(dir, depth) {
                const node = document.createElement('div');
                node.className = 'dir-node expanded';
                node.dataset.dirId = dir.id;
                node.style.setProperty('--depth', depth);
                const row = document.createElement('div');
                row.className = 'dir-row';
                if (dir.id === selectedDirId) row.classList.add('selected');
                const expandBtn = document.createElement('button');
                expandBtn.className = 'expand-btn' + (getChildren(dir.id).length ? '' : ' empty');
                expandBtn.innerHTML = '▶';
                expandBtn.addEventListener('click', e => { e.stopPropagation(); node.classList.toggle('expanded'); });
                row.appendChild(expandBtn);
                const icon = document.createElement('span');
                icon.textContent = '📄';
                row.appendChild(icon);
                const name = document.createElement('span');
                name.textContent = dir.name;
                row.appendChild(name);
                const starBtn = document.createElement('button');
                starBtn.className = 'star-btn' + (dir.isStarred ? ' starred' : '');
                starBtn.textContent = dir.isStarred ? '⭐' : '☆';
                starBtn.addEventListener('click', e => { e.stopPropagation(); toggleStar(dir.id); });
                row.appendChild(starBtn);
                row.addEventListener('click', () => selectDirectory(dir.id));
                node.appendChild(row);
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children';
                getChildren(dir.id).forEach(c => childrenContainer.appendChild(createDirNodeElement(c, depth+1)));
                node.appendChild(childrenContainer);
                return node;
            }

            function selectDirectory(dirId) {
                saveCurrentNote();
                selectedDirId = dirId;
                renderTree();
                updateEditorState();
            }

            function updateEditorState() {
                const dir = directories.find(d => d.id === selectedDirId);
                if (dir && !isTrashView) {
                    document.getElementById('editorContent').style.display = 'block';
                    document.getElementById('noNoteSelected').style.display = 'none';
                    document.getElementById('editorContent').innerHTML = notesCache[selectedDirId] || '';
                    document.getElementById('noteTitleInput').value = dir.name;
                    document.getElementById('noteTitleInput').disabled = false;
                } else {
                    document.getElementById('editorContent').style.display = 'none';
                    document.getElementById('noNoteSelected').style.display = 'flex';
                    document.getElementById('noteTitleInput').value = '';
                    document.getElementById('noteTitleInput').disabled = true;
                }
            }

            function saveCurrentNote() {
                if (selectedDirId && !isTrashView) {
                    const content = document.getElementById('editorContent').innerHTML;
                    notesCache[selectedDirId] = content;
                    const title = document.getElementById('noteTitleInput').value.trim();
                    if (title) {
                        const dir = directories.find(d => d.id === selectedDirId);
                        if (dir && dir.name !== title) { dir.name = title; updateDirDB(selectedDirId, { name: title }); }
                    }
                    saveNoteDB(selectedDirId, content);
                }
            }
            async function saveNoteDB(id, content) { await supabase.from('notes').upsert({ dir_id: id, content }); }
            async function updateDirDB(id, updates) { await supabase.from('directories').update(updates).eq('id', id); }

            async function toggleStar(dirId) {
                const dir = directories.find(d => d.id === dirId);
                if (!dir) return;
                dir.isStarred = !dir.isStarred;
                await updateDirDB(dirId, { is_starred: dir.isStarred });
                renderTree();
            }

            // 新建目录
            document.getElementById('btnNewDir').addEventListener('click', async () => {
                const name = prompt('目录名称：', '新建目录');
                if (!name) return;
                const siblings = getChildren(null);
                const newDir = { id: generateId(), name: name.trim(), parentId: null, isStarred: false, order: siblings.length };
                directories.push(newDir);
                await supabase.from('directories').insert({ id: newDir.id, user_id: currentUser.id, name: newDir.name, parent_id: null, is_starred: false, order_index: newDir.order });
                await loadAllData();
                selectDirectory(newDir.id);
            });

            // 删除
            document.getElementById('btnDelete').addEventListener('click', async () => {
                if (!selectedDirId || isTrashView) return;
                if (confirm('确定删除该目录？')) {
                    const descendantIds = getDescendantIds(selectedDirId);
                    const allIds = [selectedDirId, ...descendantIds];
                    const dir = directories.find(d => d.id === selectedDirId);
                    await supabase.from('trash').insert({ user_id: currentUser.id, dir_data: dir, sub_tree: directories.filter(d => allIds.includes(d.id) && d.id !== selectedDirId), notes_data: Object.fromEntries(allIds.map(id => [id, notesCache[id] || ''])) });
                    await supabase.from('directories').delete().in('id', allIds);
                    allIds.forEach(id => delete notesCache[id]);
                    selectedDirId = null;
                    await loadAllData();
                }
            });

            document.getElementById('btnBackFromTrash').addEventListener('click', () => {
                isTrashView = false;
                document.getElementById('trashView').style.display = 'none';
                document.getElementById('treeView').style.display = 'block';
                renderTree();
                updateEditorState();
            });
            document.getElementById('btnTrash').addEventListener('click', async () => {
                isTrashView = !isTrashView;
                if (isTrashView) {
                    document.getElementById('treeView').style.display = 'none';
                    document.getElementById('trashView').style.display = 'block';
                    const list = document.getElementById('trashList');
                    list.innerHTML = trashList.map((item,i) => `<div>${item.dir_data?.name} <button onclick="window._restoreTrash(${i})">恢复</button></div>`).join('');
                } else {
                    document.getElementById('btnBackFromTrash').click();
                }
            });
            window._restoreTrash = async function(i) {
                const item = trashList[i];
                if (!item) return;
                const dir = item.dir_data;
                directories.push(dir);
                await supabase.from('directories').insert({ id: dir.id, user_id: currentUser.id, name: dir.name, parent_id: null, is_starred: dir.is_starred || false, order_index: 0 });
                for (const [id, content] of Object.entries(item.notes_data || {})) { await supabase.from('notes').upsert({ dir_id: id, content }); }
                await supabase.from('trash').delete().eq('id', item.id);
                await loadAllData();
                isTrashView = false;
                document.getElementById('trashView').style.display = 'none';
                document.getElementById('treeView').style.display = 'block';
                renderTree();
            };

            // 编辑器工具栏
            function execCmd(cmd, val=null) { document.getElementById('editorContent').focus(); document.execCommand(cmd, false, val); saveCurrentNote(); }
            document.getElementById('btnBold').addEventListener('click', ()=>execCmd('bold'));
            document.getElementById('btnItalic').addEventListener('click', ()=>execCmd('italic'));
            document.getElementById('btnUnderline').addEventListener('click', ()=>execCmd('underline'));
            document.getElementById('fontSizeSelect').addEventListener('change', function(){ execCmd('fontSize', this.value); });
            document.getElementById('fontColorInput').addEventListener('input', function(){ execCmd('foreColor', this.value); });
            document.getElementById('btnUL').addEventListener('click', ()=>execCmd('insertUnorderedList'));
            document.getElementById('btnOL').addEventListener('click', ()=>execCmd('insertOrderedList'));

            document.getElementById('editorContent').addEventListener('input', () => clearTimeout(window._saveTimer) && (window._saveTimer = setTimeout(saveCurrentNote, 800)));
            document.getElementById('noteTitleInput').addEventListener('input', () => clearTimeout(window._saveTimer) && (window._saveTimer = setTimeout(saveCurrentNote, 800)));

            // 分隔条
            const divider = document.getElementById('divider');
            const leftPanel = document.querySelector('.left-panel');
            let dragging = false;
            divider.addEventListener('mousedown', e => { dragging = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
            document.addEventListener('mousemove', e => { if (dragging) leftPanel.style.width = Math.max(200, Math.min(e.clientX, window.innerWidth*0.55)) + 'px'; });
            document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });

            // 启动
            checkSession();
            supabase.auth.onAuthStateChange((event, session) => { if (event === 'SIGNED_OUT') location.reload(); });
            window.addEventListener('focus', () => { if (currentUser) loadAllData(); });
        })();
    </script>
</body>
</html>
